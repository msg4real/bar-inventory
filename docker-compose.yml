services:
  bar-inventory:
    build: .
    container_name: bar-inventory
    ports:
      - "8080:80"   # direct HTTP access for internal testing / NPM down or for npm on other server
      - "8443:443"   # direct HTTPS access for internal testing / NPM down
    volumes:
      - /opt/homeserver/bar/data:/data
      - /opt/homeserver/bar/app:/var/www/html
    environment:
      - DATA_PATH=/data
    restart: unless-stopped
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "curl", "-fsk", "http://localhost/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  proxy:
    external: true
