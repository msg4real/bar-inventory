# ── Main vhost (HTTP) — used by NPM proxy ────────────────────────────────────
<VirtualHost *:80>
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    SetEnvIf X-Forwarded-Proto https HTTPS=on
    RequestHeader set X-Forwarded-Proto expr=%{HTTP:X-Forwarded-Proto}
    RemoteIPHeader X-Real-IP

    <FilesMatch "\.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$">
        Header set Cache-Control "max-age=2592000, public, immutable"
    </FilesMatch>

    ErrorLog  ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>

# ── Diagnostic vhost (HTTPS) — direct access when NPM is down ────────────────
<VirtualHost *:443>
    DocumentRoot /var/www/html/public

    SSLEngine on
    SSLCertificateFile    /data/certs/cert.pem
    SSLCertificateKeyFile /data/certs/key.pem
    SSLProtocol           all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite        HIGH:!aNULL:!MD5

    <Directory /var/www/html/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    SetEnvIf X-Forwarded-Proto https HTTPS=on

    <FilesMatch "\.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$">
        Header set Cache-Control "max-age=2592000, public, immutable"
    </FilesMatch>

    ErrorLog  ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
